name: ROS 2 Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: frostlab/cougars:base-latest
  UPSTREAM_REPO: cougars-auv/cougars-dev

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ ubuntu-24.04, ubuntu-24.04-arm ]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ github.repository }}-${{ matrix.runner }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ github.repository }}-${{ matrix.runner }}-
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      - uses: ros-industrial/industrial_ci@master
        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          DOCKER_PULL: true
          UPSTREAM_WORKSPACE: dependencies.repos
          TARGET_WORKSPACE: .
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          BASEDIR: ${{ github.workspace }}/.work
          TARGET_CMAKE_ARGS: >
            -DCMAKE_BUILD_TYPE=Debug
            -DCMAKE_CXX_FLAGS="--coverage"
            -DCMAKE_C_FLAGS="--coverage"
          AFTER_SETUP_UPSTREAM_WORKSPACE: |
            git config --global --add safe.directory "*"
            vcs custom -n --git --args submodule update --init --recursive
      - if: matrix.runner == 'ubuntu-24.04'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  trigger-upstream:
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ env.UPSTREAM_REPO }}
          event-type: ros2_dispatch
          client-payload: "{\"repo\": \"${{ github.repository }}\", \"sha\": \"${{
            github.sha }}\"}"
