name: ROS 2 Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: frostlab/cougars:base-latest
  UPSTREAM_REPO: cougars-auv/cougars-dev

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ ubuntu-24.04, ubuntu-24.04-arm ]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ github.repository }}-${{ matrix.runner }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ github.repository }}-${{ matrix.runner }}-
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      - uses: ros-industrial/industrial_ci@master
        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          DOCKER_PULL: true
          UPSTREAM_WORKSPACE: dependencies.repos
          TARGET_WORKSPACE: .
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          BASEDIR: ${{ github.workspace }}/.work
          TARGET_CMAKE_ARGS: >
            -DCMAKE_BUILD_TYPE=${{ matrix.runner == 'ubuntu-24.04' && 'Debug' ||
            'Release' }} -DCMAKE_CXX_FLAGS="${{ matrix.runner == 'ubuntu-24.04'
            && '--coverage' || '' }}" -DCMAKE_C_FLAGS="${{ matrix.runner ==
            'ubuntu-24.04' && '--coverage' || '' }}"
          AFTER_SETUP_UPSTREAM_WORKSPACE: |
            git config --global --add safe.directory "*"
            vcs custom -n --git --args submodule update --init --recursive
          BEFORE_RUN_TARGET_TEST: |
            apt-get update && apt-get install -y lcov python3-colcon-lcov-result
            cd "$target_ws" && colcon lcov-result --initial
          AFTER_RUN_TARGET_TEST: |
            cd "$target_ws" && colcon lcov-result --filter '/usr/*' '/opt/*' '*/test/*' || true
      - if: matrix.runner == 'ubuntu-24.04'
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y python3-coverage
          TARGET_WS="${{ github.workspace }}/.work/target_ws"
          CONTAINER_SRC="$TARGET_WS/src/${{ github.event.repository.name }}"
          REPO_SRC="${{ github.workspace }}"
          [ -f "$TARGET_WS/lcov/total_coverage.info" ] && \
            sed "s|$CONTAINER_SRC|$REPO_SRC|g" "$TARGET_WS/lcov/total_coverage.info" > coverage.info
          covs=$(find "$TARGET_WS/build" -maxdepth 2 -name .coverage 2>/dev/null || true)
          if [ -n "$covs" ] && ( cd "$CONTAINER_SRC" && export COVERAGE_FILE="$TARGET_WS/.coverage"
               python3 -m coverage combine --keep $covs &&
               python3 -m coverage xml -o "${{ github.workspace }}/coverage-py.xml" --omit='*/test/*,*/setup.py' ); then
            sed -i "s|$CONTAINER_SRC|$REPO_SRC|g" "${{ github.workspace }}/coverage-py.xml"
          fi
      - if: matrix.runner == 'ubuntu-24.04'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.info,coverage-py.xml
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  trigger-upstream:
    needs: build-test
    runs-on: ubuntu-24.04
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ env.UPSTREAM_REPO }}
          event-type: ros2_dispatch
          client-payload: "{\"repo\": \"${{ github.repository }}\", \"sha\": \"${{
            github.sha }}\"}"
