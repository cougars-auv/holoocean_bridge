/**:
  imu_converter_node:
    ros__parameters:
      imu_input_topic: "IMUSensor"
      ahrs_input_topic: "RotationSensor"
      output_topic: "imu/data"
      bias_topic: "imu/bias"

      # SBG Ellipse-N noise densities scaled to discrete per-sample sigmas at 200 Hz
      # (57 µg/√Hz -> 0.0079 m/s^2, 0.18 °/√h -> 0.00074 rad/s).
      # https://support.sbg-systems.com/sc/el/latest/ellipse-documentation/performance-specifications
      accel_noise_sigmas: [0.0079, 0.0079, 0.0079] # [m/s^2] Accelerometer measurement noise sigmas.
      gyro_noise_sigmas: [0.00074, 0.00074, 0.00074] # [rad/s] Gyroscope measurement noise sigmas.
      # SBG Ellipse-N AHRS: 0.4° roll/pitch, 1.0° magnetic heading (typical dynamics).
      ahrs_noise_sigmas: [0.00698, 0.00698, 0.01745] # [roll, pitch, yaw] [rad] AHRS orientation uncertainty sigmas.
      # Derived from the SBG Ellipse-N in-run bias instabilities (14 µg accel, 7 °/h gyro).
      accel_bias_rw_sigmas: [1.4e-4, 1.4e-4, 1.4e-4] # [m/s^2/√s] Continuous-time accel bias random walk spectral density sigmas.
      gyro_bias_rw_sigmas: [3.39e-5, 3.39e-5, 3.39e-5] # [rad/s/√s] Continuous-time gyro bias random walk spectral density sigmas.

  gps_converter_node:
    ros__parameters:
      input_topic: "GPSSensor"
      output_topic: "gps/fix"

      origin_latitude: 40.33940
      origin_longitude: -111.90721
      origin_altitude: 1412.0

      # SBG Ellipse-N internal GNSS, RTK: 1 cm + 1 ppm horizontal position accuracy.
      # https://www.sbg-systems.com/ins/ellipse-n/
      noise_sigmas: [0.015, 0.015, 0.025] # [east, north, up] [m] GPS position uncertainty sigmas.

  depth_converter_node:
    ros__parameters:
      input_topic: "DepthSensor"
      output_topic: "depth/odometry"

      # TE MS5837-02BA (Bar02): ±2 mbar (~2 cm H2O) accuracy over 0-60 °C.
      # https://www.te.com/en/product-CAT-BLPS0059.html
      noise_sigma: 0.02 # [m] Depth sensor Z-position uncertainty sigma.

  pressure_converter_node:
    ros__parameters:
      input_topic: "DepthSensor"
      output_topic: "pressure/data"

      water_density: 997.0 # [kg/m^3]
      gravity: 9.81 # [m/s^2]
      atmospheric_pressure: 101325.0 # [Pa]

      # TE MS5837-02BA (Bar02): ±2 mbar (~2 cm H2O) accuracy over 0-60 °C.
      # https://www.te.com/en/product-CAT-BLPS0059.html
      noise_sigma: 195.61 # [Pa]

  mag_converter_node:
    ros__parameters:
      input_topic: "MagnetometerSensor"
      output_topic: "imu/mag"

      # SBG Ellipse magnetometer: 3 mGauss RMS noise / ~0.504 Gauss local field -> ~0.006.
      # https://support.sbg-systems.com/sc/el/latest/ellipse-documentation/hardware-documentation/aiding-sensors
      noise_sigmas: [0.006, 0.006, 0.006] # [normalized] Magnetic field uncertainty sigmas.

  dvl_converter_node:
    ros__parameters:
      input_topic: "DVLSensorVelocity"
      output_topic: "dvl/data"
      config_command_topic: "dvl/config/command"

      # Water Linked DVL A50: ±1.01% long-term velocity accuracy (~0.01 m/s at 1 m/s).
      # https://waterlinked.com/dvl-a50
      noise_sigmas: [0.02, 0.02, 0.02] # [m/s] DVL body-velocity uncertainty sigmas.

  dvl_odom_converter_node:
    ros__parameters:
      input_topic: "DynamicsSensorOdom"
      output_topic: "dvl/position"

  stereo_converter_node:
    ros__parameters:
      front_input_topic: "RGBCameraFront"
      back_input_topic: "RGBCameraBack"
      front_output_topic: "stereo/front/image_raw"
      back_output_topic: "stereo/back/image_raw"
      front_stereo_info_topic: "stereo/front/camera_info"
      back_stereo_info_topic: "stereo/back/camera_info"

  wrench_converter_node:
    ros__parameters:
      agent_topic: "/command/agent"
      control_topic: "ControlCommand"
      velocity_topic: "VelocitySensor"
      wrench_raw_topic: "cmd_wrench_raw"
      wrench_topic: "cmd_wrench"

  truth_converter_node:
    ros__parameters:
      input_topic: "DynamicsSensorOdom"
      output_topic: "odometry/truth"

      publish_tf: false # Whether to publish the map->base_link transform

  fin_state_publisher_node:
    ros__parameters:
      input_topic: "ControlCommand"
      output_topic: "joint_states"

  cmd_vel_converter_node:
    ros__parameters:
      input_topic: "cmd_vel_out"
      output_topic: "/command/agent"

  hsd_converter_node:
    ros__parameters:
      hsd_topic: "cmd_hsd"
      output_heading_topic: "/heading"
      output_speed_topic: "/speed"
      output_depth_topic: "/depth"

  modem_imu_converter_node:
    ros__parameters:
      imu_input_topic: "ModemIMUSensor"
      ahrs_input_topic: "ModemRotationSensor"
      output_topic: "modem/imu/data"
      bias_topic: "modem/imu/bias"

      # The real modem_status arrives at 10 Hz (seatrac-ros2 sets STATUS_MODE_10HZ).
      # No published SeaTrac accel/gyro specs; matches the SBG Ellipse-N noise densities
      # scaled to discrete per-sample sigmas at 10 Hz.
      accel_noise_sigmas: [0.0018, 0.0018, 0.0018] # [m/s^2] Accelerometer measurement noise sigmas.
      gyro_noise_sigmas: [0.00017, 0.00017, 0.00017] # [rad/s] Gyroscope measurement noise sigmas.
      # Blueprint Subsea SeaTrac X150 AHRS: ±0.2° pitch/roll, ±1.0° yaw standard deviation.
      # https://www.blueprintsubsea.com/seatrac/seatrac-standard
      ahrs_noise_sigmas: [0.00349, 0.00349, 0.01745] # [roll, pitch, yaw] [rad] AHRS orientation uncertainty sigmas.
      # Derived from the SBG Ellipse-N in-run bias instabilities (14 µg accel, 7 °/h gyro).
      accel_bias_rw_sigmas: [1.4e-4, 1.4e-4, 1.4e-4] # [m/s^2/√s] Continuous-time accel bias random walk spectral density sigmas.
      gyro_bias_rw_sigmas: [3.39e-5, 3.39e-5, 3.39e-5] # [rad/s/√s] Continuous-time gyro bias random walk spectral density sigmas.

  modem_mag_converter_node:
    ros__parameters:
      input_topic: "ModemMagnetometerSensor"
      output_topic: "modem/imu/mag"

      # No published SeaTrac spec; matches the SBG Ellipse magnetometer (3 mGauss RMS noise / ~0.504 Gauss local field -> ~0.006).
      noise_sigmas: [0.006, 0.006, 0.006] # [normalized] Magnetic field uncertainty sigmas.

  modem_status_converter_node:
    ros__parameters:
      imu_input_topic: "modem/imu/data"
      mag_input_topic: "modem/imu/mag"
      output_topic: "modem_status"

  modem_depth_converter_node:
    ros__parameters:
      input_topic: "ModemDepthSensor"
      output_topic: "modem/depth/odometry"

      # SeaTrac X150 depth telemetry resolution: 0.1 m (SeaTrac Developer Guide UM-140).
      # https://www.blueprintsubsea.com/seatrac/support
      noise_sigma: 0.1 # [m] Depth sensor Z-position uncertainty sigma.

  modem_converter_node:
    ros__parameters:
      beacon_rec_topic: "AcousticBeaconSensor"
      beacon_send_topic: "/acoustic_beacon_send"
      modem_rec_topic: "modem_rec"
      modem_send_topic: "modem_send"
      modem_cmd_update_topic: "modem_cmd_update"
      depth_topic: "modem/depth/odometry"

      tick_period_sec: 0.1 # [s]
      send_delay_sec: 0.4 # [s]
      resp_delay_sec: 0.0 # [s]
      resp_timeout_sec: 4.0 # [s]
      beacon_id: 1
